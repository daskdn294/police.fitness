<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precinct Fitness Competition</title>
    <!-- Include Firebase Core and Database SDKs over the internet -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 32px 16px;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 800;
            letter-spacing: -0.025em;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header p {
            margin: 8px 0 0 0;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        h2 { 
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main); 
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        #adminPanel {
            display: none;
            border: 2px dashed var(--accent-red);
            background: #1e1b1b;
        }

        .btn {
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:hover { 
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        .btn-admin-toggle { 
            background-color: transparent; 
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        
        .btn-admin-toggle:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .btn-admin { background-color: var(--accent-red); color: white; }
        .btn-danger { background-color: #7f1d1d; color: #fca5a5; margin-top: 8px; border: 1px solid #991b1b; }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            box-sizing: border-box;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .code-display {
            background: var(--bg-main);
            padding: 16px;
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            font-weight: 800;
            letter-spacing: 2px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 8px;
        }

        th { 
            padding: 12px 16px;
            text-align: left; 
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            background-color: var(--bg-main);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        
        /* Podium places text styling instead of icons */
        tr:nth-child(1) td { border-color: rgba(245, 158, 11, 0.3); }
        tr:nth-child(1) td:last-child { color: var(--accent-gold); }
        
        tr:nth-child(2) td:last-child { color: #cbd5e1; }
        tr:nth-child(3) td:last-child { color: #b45309; }
        
        .status-msg {
            color: var(--accent-green);
            font-weight: 600;
            margin-top: 12px;
            font-size: 0.9rem;
            text-align: center;
        }

        .admin-box {
            border-top: 1px solid var(--border-color);
            margin-top: 24px;
            padding-top: 24px;
        }
        
        .active-banner {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--accent-blue);
        }
        
        .rank-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }
        .rank-1 { background: rgba(245, 158, 11, 0.2); color: var(--accent-gold); }
        .rank-2 { background: rgba(203, 213, 225, 0.2); color: #cbd5e1; }
        .rank-3 { background: rgba(180, 83, 9, 0.2); color: #f97316; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PD Fitness Leaderboard</h1>
        <p>STAY FIT • STAY SHARP</p>
    </header>

    <!-- Admin Authentication Toggle -->
    <button class="btn btn-admin-toggle" id="adminToggleBtn" onclick="accessAdminPanel()">Open Admin Panel</button>

    <!-- ADMIN CONTROL PANEL -->
    <div id="adminPanel" class="card">
        <h2>Admin Control Panel</h2>
        <div class="form-group">
            <button class="btn btn-admin" onclick="generateBlankCode()">Generate Team Code</button>
        </div>
        <div id="codeOutput" style="display:none; margin-bottom: 20px;">
            <label>Provide this code to the first team officer:</label>
            <div class="code-display" id="generatedCode"></div>
        </div>

        <div class="admin-box">
            <h2 style="font-size: 1.1rem; margin-bottom: 12px;">Manage Registered Teams</h2>
            <div class="form-group">
                <select id="adminTeamSelect"></select>
            </div>
            <button class="btn" style="background-color: transparent; border: 1px solid var(--border-color); color: white; margin-bottom: 8px;" onclick="resetTeamName()">Reset Team Name</button>
            <button class="btn btn-danger" onclick="deleteTeamComplete()">Delete Team Entirely</button>
        </div>
    </div>

    <!-- JOIN TEAM SECTION -->
    <div class="card" id="joinCard">
        <h2>Join Competition</h2>
        <div class="form-group">
            <label for="userNameInput">Officer Name</label>
            <input type="text" id="userNameInput" placeholder="e.g., Officer Smith">
        </div>
        <div class="form-group">
            <label for="joinCodeInput">Invite Code</label>
            <input type="text" id="joinCodeInput" placeholder="FIT-XXXXXX">
        </div>
        
        <div class="form-group" id="teamNamingGroup" style="display: none;">
            <label for="newTeamNameInput" style="color: var(--accent-gold);">First officer with this code! Name your Team:</label>
            <input type="text" id="newTeamNameInput" placeholder="e.g., K9 Unit, Night Shift Squad">
        </div>

        <button class="btn" id="joinBtn" onclick="processTeamJoin()">Connect & Verify</button>
        <div id="joinStatus" class="status-msg"></div>
    </div>

    <!-- SCORE SUBMISSION CARD -->
    <div class="card" id="scoreCard" style="display:none;">
        <h2>Log Metric</h2>
        <div class="active-banner">
            Logged in: <strong id="activeUser"></strong> | Team: <strong id="activeTeam"></strong>
        </div>
        <div class="form-group">
            <label for="scoreInput">Workout Performance Score</label>
            <input type="number" id="scoreInput" placeholder="Enter numerical score">
        </div>
        <button class="btn" style="background-color: var(--accent-green); color: white;" onclick="submitScore()">Submit Score</button>
        <div id="scoreStatus" class="status-msg"></div>
    </div>

    <!-- LEADERBOARD DATA -->
    <div class="card">
        <h2>Current Standings</h2>
        <table id="leaderboardTable">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Officer</th>
                    <th style="text-align: right;">Score</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlc5_jvyEwaNLiWU1Wrc-cUaWfSIpuLF8",
        authDomain: "precinct-fitness.firebaseapp.com",
        databaseURL: "https://fitness-2b916-default-rtdb.firebaseio.com/",
        projectId: "precinct-fitness",
        storageBucket: "precinct-fitness.firebasestorage.app",
        messagingSenderId: "752143857902",
        appId: "1:752143857902:web:c174868bca39e1ac475bff",
        measurementId: "G-JTBBQLJFPC"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let activeSessionUser = null;
    let activeSessionCode = null;
    let isFirstUserForCode = false;
    let cachedTeams = {}; 

    database.ref('teams').on('value', (snapshot) => {
        cachedTeams = snapshot.val() || {};
        populateAdminDropdown();
        checkCodeInputState();
    });

    database.ref('scores').on('value', (snapshot) => {
        const scoresData = snapshot.val() || {};
        const scoresArray = Object.keys(scoresData).map(key => scoresData[key]);
        renderLeaderboard(scoresArray);
    });

    function accessAdminPanel() {
        const password = prompt("Enter Admin Passcode:");
        if (password === "7821") {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminToggleBtn').style.display = 'none';
            populateAdminDropdown();
        } else if (password !== null) {
            alert("Access Denied.");
        }
    }

    function generateBlankCode() {
        const uniqueCode = 'FIT-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        database.ref('teams/' + uniqueCode).set({ name: "" });
        document.getElementById('generatedCode').innerText = uniqueCode;
        document.getElementById('codeOutput').style.display = 'block';
    }

    function checkCodeInputState() {
        const enteredCode = document.getElementById('joinCodeInput').value.trim().toUpperCase();
        if (cachedTeams[enteredCode] && cachedTeams[enteredCode].name === "") {
            document.getElementById('teamNamingGroup').style.display = 'block';
            document.getElementById('joinBtn').innerText = "Create Team & Login";
            isFirstUserForCode = true;
        } else {
            document.getElementById('teamNamingGroup').style.display = 'none';
            document.getElementById('joinBtn').innerText = "Connect & Verify";
            isFirstUserForCode = false;
        }
    }

    document.getElementById('joinCodeInput').addEventListener('input', checkCodeInputState);

    function processTeamJoin() {
        const name = document.getElementById('userNameInput').value.trim();
        const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();

        if (!name) return alert("Please enter your name.");
        if (!cachedTeams.hasOwnProperty(code)) return alert("Invalid Code.");

        let designatedTeamName = cachedTeams[code].name;

        if (isFirstUserForCode) {
            const chosenName = document.getElementById('newTeamNameInput').value.trim();
            if (!chosenName) return alert("Please type a Team Name.");
            
            database.ref('teams/' + code).set({ name: chosenName });
            designatedTeamName = chosenName;
        }

        activeSessionUser = name;
        activeSessionCode = code;

        document.getElementById('activeUser').innerText = activeSessionUser;
        document.getElementById('activeTeam').innerText = designatedTeamName;
        document.getElementById('scoreCard').style.display = 'block';
        document.getElementById('joinStatus').innerText = `Joined team: ${designatedTeamName}`;
        
        document.getElementById('userNameInput').value = '';
        document.getElementById('joinCodeInput').value = '';
        document.getElementById('teamNamingGroup').style.display = 'none';
    }

    function submitScore() {
        const numScore = parseInt(document.getElementById('scoreInput').value);
        if (isNaN(numScore)) return alert("Please enter a valid number.");

        const teamName = cachedTeams[activeSessionCode].name;
        const userSlug = `${teamName}_${activeSessionUser}`.replace(/[.#$\[\]]/g, ""); 

        database.ref('scores/' + userSlug).set({
            team: teamName,
            user: activeSessionUser,
            score: numScore
        });

        document.getElementById('scoreStatus').innerText = "Score recorded successfully!";
        document.getElementById('scoreInput').value = '';
    }

    function populateAdminDropdown() {
        const select = document.getElementById('adminTeamSelect');
        if(!select) return;
        select.innerHTML = '';

        for (const [code, data] of Object.entries(cachedTeams)) {
            const displayName = data.name === "" ? `Unassigned Code (${code})` : `${data.name} [${code}]`;
            const option = document.createElement('option');
            option.value = code;
            option.text = displayName;
            select.appendChild(option);
        }
    }

    function resetTeamName() {
        const targetCode = document.getElementById('adminTeamSelect').value;
        if(!targetCode) return;
        database.ref('teams/' + targetCode).set({ name: "" });
        alert("Team name reset.");
    }

    function deleteTeamComplete() {
        const targetCode = document.getElementById('adminTeamSelect').value;
        if(!targetCode || !confirm("Delete this team and all corresponding scores?")) return;
        
        const targetName = cachedTeams[targetCode].name;
        database.ref('teams/' + targetCode).remove();

        database.ref('scores').once('value', (snapshot) => {
            const scores = snapshot.val() || {};
            for (const key in scores) {
                if (scores[key].team === targetName) {
                    database.ref('scores/' + key).remove();
                }
            }
        });
        alert("Team data deleted.");
    }

    function renderLeaderboard(scoresArray) {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        scoresArray.sort((a, b) => b.score - a.score);

        if(scoresArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: var(--text-muted); border: none; padding: 32px 16px;">No metrics logged yet.</td></tr>`;
            return;
        }

        scoresArray.forEach((item, index) => {
            const row = document.createElement('tr');
            let rankBadge = "";
            if (index === 0) rankBadge = `<span class="rank-label rank-1">1st</span>`;
            if (index === 1) rankBadge = `<span class="rank-label rank-2">2nd</span>`;
            if (index === 2) rankBadge = `<span class="rank-label rank-3">3rd</span>`;

            row.innerHTML = `
                <td><strong>${rankBadge}${item.team}</strong></td>
                <td style="color: var(--text-muted);">${item.user}</td>
                <td style="text-align: right; font-weight: 700; font-size: 1.1rem;">${item.score}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>
</body>
</html>
