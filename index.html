<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFITNESS LEADERBOARD</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 32px 16px;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 800;
            letter-spacing: -0.025em;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #liveClock {
            margin: 8px 0 0 0;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            font-family: monospace;
        }

        h2 { 
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main); 
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        #adminPanel {
            display: none;
            border: 2px dashed var(--accent-red);
            background: #1e1b1b;
        }

        .btn {
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:hover { 
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        .btn-admin-toggle { 
            background-color: transparent; 
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        
        .btn-admin-toggle:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .btn-admin { background-color: var(--accent-red); color: white; }
        .btn-danger { background-color: #7f1d1d; color: #fca5a5; margin-top: 8px; border: 1px solid #991b1b; }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            box-sizing: border-box;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .code-display {
            background: var(--bg-main);
            padding: 16px;
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            font-weight: 800;
            letter-spacing: 2px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 8px;
        }

        th { 
            padding: 12px 16px;
            text-align: left; 
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            background-color: var(--bg-main);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .clickable-row {
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .clickable-row:hover td {
            border-color: var(--accent-blue);
            background-color: #131f38;
        }

        td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        
        tr:nth-child(1) td { border-color: rgba(245, 158, 11, 0.3); }
        tr:nth-child(1) td:last-child { color: var(--accent-gold); }
        
        tr:nth-child(2) td:last-child { color: #cbd5e1; }
        tr:nth-child(3) td:last-child { color: #b45309; }
        
        .status-msg {
            color: var(--accent-green);
            font-weight: 600;
            margin-top: 12px;
            font-size: 0.9rem;
            text-align: center;
        }

        .admin-box {
            border-top: 1px solid var(--border-color);
            margin-top: 24px;
            padding-top: 24px;
        }
        
        .active-banner {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--accent-blue);
        }
        
        .rank-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }
        .rank-1 { background: rgba(245, 158, 11, 0.2); color: var(--accent-gold); }
        .rank-2 { background: rgba(203, 213, 225, 0.2); color: #cbd5e1; }
        .rank-3 { background: rgba(180, 83, 9, 0.2); color: #f97316; }

        /* Custom Modal / Popup Box */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-close:hover {
            color: var(--text-main);
        }

        .audit-item {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .flag-badge {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FFITNESS LEADERBOARD</h1>
        <div id="liveClock">Loading Date & Time...</div>
    </header>

    <button class="btn btn-admin-toggle" id="adminToggleBtn" onclick="accessAdminPanel()">Open Admin Panel</button>

    <div id="adminPanel" class="card">
        <h2>Admin Control Panel</h2>
        <div class="form-group">
            <button class="btn btn-admin" onclick="generateBlankCode()">Generate Team Code</button>
        </div>
        <div id="codeOutput" style="display:none; margin-bottom: 20px;">
            <label>Provide this code to the first team officer:</label>
            <div class="code-display" id="generatedCode"></div>
        </div>

        <div class="admin-box">
            <h2 style="font-size: 1.1rem; margin-bottom: 12px;">Manage Registered Teams</h2>
            <div class="form-group">
                <select id="adminTeamSelect"></select>
            </div>
            <button class="btn" style="background-color: transparent; border: 1px solid var(--border-color); color: white; margin-bottom: 8px;" onclick="changeTeamNameCustom()">Change Selected Team Name</button>
            <button class="btn btn-danger" onclick="deleteTeamComplete()">Delete Team Entirely</button>
        </div>
    </div>

    <div class="card" id="joinCard">
        <h2>Join Competition</h2>
        <div class="form-group">
            <label for="userNameInput">Officer Name</label>
            <input type="text" id="userNameInput" placeholder="e.g., Officer Smith">
        </div>
        <div class="form-group">
            <label for="joinCodeInput">Invite Code</label>
            <input type="text" id="joinCodeInput" placeholder="FIT-XXXXXX">
        </div>
        
        <div class="form-group" id="teamNamingGroup" style="display: none;">
            <label for="newTeamNameInput" style="color: var(--accent-gold);">First officer with this code! Name your Team (You are Captain):</label>
            <input type="text" id="newTeamNameInput" placeholder="e.g., K9 Unit, Night Shift Squad">
        </div>

        <button class="btn" id="joinBtn" onclick="processTeamJoin()">Connect & Verify</button>
        <div id="joinStatus" class="status-msg"></div>
    </div>

    <div class="card" id="scoreCard" style="display:none;">
        <h2>Log Metric</h2>
        <div class="active-banner">
            Logged in: <strong id="activeUser"></strong> | Team: <strong id="activeTeam"></strong>
        </div>
        <div class="form-group">
            <label for="scoreInput">Workout Performance Score</label>
            <input type="number" id="scoreInput" placeholder="Enter numerical score">
        </div>
        <button class="btn" style="background-color: var(--accent-green); color: white;" onclick="submitScore()">Submit Score</button>
        <div id="scoreStatus" class="status-msg"></div>
    </div>

    <div class="card">
        <h2>Current Standings</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: -12px; margin-bottom: 16px;">Protected: Admins and Team Captains can click rows to inspect detailed scores.</p>
        <table id="leaderboardTable">
            <thead>
                <tr>
                    <th>Team</th>
                    <th style="text-align: right;">Total Team Score</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<div id="auditModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="modalTitle" style="margin: 0;">Team Audit</h2>
            <button class="modal-close" onclick="document.getElementById('auditModal').style.display='none'">×</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlc5_jvyEwaNLiWU1Wrc-cUaWfSIpuLF8",
        authDomain: "precinct-fitness.firebaseapp.com",
        databaseURL: "https://fitness-2b916-default-rtdb.firebaseio.com/",
        projectId: "precinct-fitness",
        storageBucket: "precinct-fitness.firebasestorage.app",
        messagingSenderId: "752143857902",
        appId: "1:752143857902:web:c174868bca39e1ac475bff",
        measurementId: "G-JTBBQLJFPC"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let activeSessionUser = null;
    let activeSessionCode = null;
    let isFirstUserForCode = false;
    let cachedTeams = {}; 
    let cachedScores = {};
    let masterAdminUnlocked = false;

    // Real-time Ticking Clock
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = now.toLocaleDateString(undefined, options);
        const timeStr = now.toLocaleTimeString(undefined, { hour12: true });
        document.getElementById('liveClock').innerText = `${dateStr} • ${timeStr}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    database.ref('teams').on('value', (snapshot) => {
        cachedTeams = snapshot.val() || {};
        populateAdminDropdown();
        checkCodeInputState();
        reprocessLeaderboard();
    });

    database.ref('scores').on('value', (snapshot) => {
        cachedScores = snapshot.val() || {};
        reprocessLeaderboard();
    });

    // Anti-troll validator function
    function isValidReadableName(str) {
        const clean = str.trim();
        if (clean.length < 4) return false;
        if (/[bcdfghjklmnpqrstvwxyz]{5,}/i.test(clean)) return false;
        if (!/[a-zA-Z]/.test(clean)) return false;
        return true;
    }

    function accessAdminPanel() {
        const password = prompt("Enter Admin Passcode:");
        if (password === "7821") {
            masterAdminUnlocked = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminToggleBtn').style.display = 'none';
            populateAdminDropdown();
        } else if (password !== null) {
            alert("Access Denied.");
        }
    }

    function generateBlankCode() {
        const uniqueCode = 'FIT-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        database.ref('teams/' + uniqueCode).set({ name: "" });
        document.getElementById('generatedCode').innerText = uniqueCode;
        document.getElementById('codeOutput').style.display = 'block';
    }

    function checkCodeInputState() {
        const enteredCode = document.getElementById('joinCodeInput').value.trim().toUpperCase();
        if (cachedTeams[enteredCode] && cachedTeams[enteredCode].name === "") {
            document.getElementById('teamNamingGroup').style.display = 'block';
            document.getElementById('joinBtn').innerText = "Create Team & Login";
            isFirstUserForCode = true;
        } else {
            document.getElementById('teamNamingGroup').style.display = 'none';
            document.getElementById('joinBtn').innerText = "Connect & Verify";
            isFirstUserForCode = false;
        }
    }

    document.getElementById('joinCodeInput').addEventListener('input', checkCodeInputState);

    function processTeamJoin() {
        const name = document.getElementById('userNameInput').value.trim();
        const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();

        if (!name) return alert("Please enter your name.");
        if (!isValidReadableName(name)) return alert("Please enter a valid, recognizable name. Avoid random letters or shortcuts.");
        if (!cachedTeams.hasOwnProperty(code)) return alert("Invalid Code.");

        let designatedTeamName = cachedTeams[code].name;

        if (isFirstUserForCode) {
            const chosenName = document.getElementById('newTeamNameInput').value.trim();
            if (!chosenName) return alert("Please type a Team Name.");
            if (!isValidReadableName(chosenName)) return alert("Invalid Team Name. Use a realistic name (minimum 4 characters, no random letters).");
            
            database.ref('teams/' + code).set({ name: chosenName });
            designatedTeamName = chosenName;
        }

        activeSessionUser = name;
        activeSessionCode = code;

        document.getElementById('activeUser').innerText = activeSessionUser;
        document.getElementById('activeTeam').innerText = designatedTeamName;
        document.getElementById('scoreCard').style.display = 'block';
        document.getElementById('joinStatus').innerText = `Joined team: ${designatedTeamName}`;
        
        document.getElementById('userNameInput').value = '';
        document.getElementById('joinCodeInput').value = '';
        document.getElementById('teamNamingGroup').style.display = 'none';
    }

    function submitScore() {
        const numScore = parseInt(document.getElementById('scoreInput').value);
        if (isNaN(numScore)) return alert("Please enter a valid number.");

        const teamName = cachedTeams[activeSessionCode].name;
        const userSlug = `${teamName}_${activeSessionUser}`.replace(/[.#$\[\]]/g, ""); 

        // Fetch user's existing history before saving to perform background validation calculation
        database.ref('scores/' + userSlug).once('value', (snapshot) => {
            const currentData = snapshot.val() || { totalScore: 0, entriesCount: 0, averageScore: 0, flagged: false };
            
            let previousTotal = currentData.totalScore || 0;
            let previousCount = currentData.entriesCount || 0;
            let previousAverage = currentData.averageScore || 0;
            
            // Calculate new upcoming running metrics
            let newTotal = previousTotal + numScore;
            let newCount = previousCount + 1;
            let newAverage = Math.round((newTotal / newCount) * 10) / 10;

            let shouldFlagUser = currentData.flagged || false;

            // DYNAMIC AB-NORMAL SPIKE FILTERING
            // If they already have an established workout average baseline score, evaluate spikes
            if (previousCount >= 1 && previousAverage > 0) {
                // PLACEHOLDER FRAUD CHECK RULE: 
                // Flag if the newly logged single workout score is over 3x their existing baseline average.
                // Feel free to replace this math line once you give me your exact score bounds!
                if (numScore > (previousAverage * 3)) {
                    shouldFlagUser = true;
                }
            }

            // Save running aggregates right along with the profile parameters
            database.ref('scores/' + userSlug).set({
                team: teamName,
                user: activeSessionUser,
                score: newTotal, // Cumulative master leader score tracking
                totalScore: newTotal,
                entriesCount: newCount,
                averageScore: newAverage,
                lastLoggedScore: numScore,
                flagged: shouldFlagUser
            });

            document.getElementById('scoreStatus').innerText = "Score metrics recorded!";
            document.getElementById('scoreInput').value = '';
        });
    }

    function populateAdminDropdown() {
        const select = document.getElementById('adminTeamSelect');
        if(!select) return;
        select.innerHTML = '';

        for (const [code, data] of Object.entries(cachedTeams)) {
            const displayName = data.name === "" ? `Unassigned Code (${code})` : `${data.name} [${code}]`;
            const option = document.createElement('option');
            option.value = code;
            option.text = displayName;
            select.appendChild(option);
        }
    }

    function changeTeamNameCustom() {
        const targetCode = document.getElementById('adminTeamSelect').value;
        if (!targetCode) return;

        const currentName = cachedTeams[targetCode].name;
        const newName = prompt(`Enter new name for this team (Currently: "${currentName || 'Unassigned'}"):`);
        
        if (newName === null) return; 
        const cleanedName = newName.trim();
        if (!cleanedName) return alert("Team name cannot be empty.");
        if (!isValidReadableName(cleanedName)) return alert("That name looks like spam. Please enter a valid name.");

        database.ref('teams/' + targetCode).set({ name: cleanedName });

        if (currentName) {
            database.ref('scores').once('value', (snapshot) => {
                const scores = snapshot.val() || {};
                for (const key in scores) {
                    if (scores[key].team === currentName) {
                        database.ref('scores/' + key).update({ team: cleanedName });
                    }
                }
            });
        }
        alert("Team name updated successfully!");
    }

    function deleteTeamComplete() {
        const targetCode = document.getElementById('adminTeamSelect').value;
        if(!targetCode || !confirm("Delete this team and all corresponding scores?")) return;
        
        const targetName = cachedTeams[targetCode].name;
        database.ref('teams/' + targetCode).remove();

        database.ref('scores').once('value', (snapshot) => {
            const scores = snapshot.val() || {};
            for (const key in scores) {
                if (scores[key].team === targetName) {
                    database.ref('scores/' + key).remove();
                }
            }
        });
        alert("Team data deleted.");
    }

    function reprocessLeaderboard() {
        const scoresArray = Object.keys(cachedScores).map(key => cachedScores[key]);
        
        const teamTotals = {};
        scoresArray.forEach(item => {
            if (!teamTotals[item.team]) {
                teamTotals[item.team] = 0;
            }
            teamTotals[item.team] += (item.totalScore || item.score || 0);
        });

        const leaderboardData = Object.keys(teamTotals).map(teamName => {
            return { team: teamName, totalScore: teamTotals[teamName] };
        });

        leaderboardData.sort((a, b) => b.totalScore - a.totalScore);
        renderLeaderboard(leaderboardData);
    }

    function renderLeaderboard(leaderboardData) {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        if(leaderboardData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color: var(--text-muted); border: none; padding: 32px 16px;">No metrics logged yet.</td></tr>`;
            return;
        }

        leaderboardData.forEach((item, index) => {
            const row = document.createElement('tr');
            row.className = "clickable-row";
            row.onclick = () => verifyAuditAccess(item.team);

            let rankBadge = "";
            if (index === 0) rankBadge = `<span class="rank-label rank-1">1st</span>`;
            if (index === 1) rankBadge = `<span class="rank-label rank-2">2nd</span>`;
            if (index === 2) rankBadge = `<span class="rank-label rank-3">3rd</span>`;

            row.innerHTML = `
                <td><strong>${rankBadge}${item.team}</strong></td>
                <td style="text-align: right; font-weight: 700; font-size: 1.1rem;">${item.totalScore}</td>
            `;
            tbody.appendChild(row);
        });
    }

    function verifyAuditAccess(teamName) {
        let teamCodeMatch = null;
        for (const [code, data] of Object.entries(cachedTeams)) {
            if (data.name === teamName) {
                teamCodeMatch = code;
                break;
            }
        }

        if (masterAdminUnlocked) {
            return openTeamAudit(teamName);
        }

        const checkPass = prompt(`Protected Access. Enter Master Admin Passcode OR the exact Invite Code (FIT-XXXXXX) for "${teamName}" to view files:`);
        if (!checkPass) return;

        const cleanInput = checkPass.trim().toUpperCase();

        if (cleanInput === "7821" || (teamCodeMatch && cleanInput === teamCodeMatch)) {
            openTeamAudit(teamName);
        } else {
            alert("Unauthorized. Only the Admin or the designated Team Captain can view this roster.");
        }
    }

    function openTeamAudit(teamName) {
        document.getElementById('modalTitle').innerText = `${teamName} - Member Breakdown`;
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = '';

        const scoresArray = Object.keys(cachedScores).map(key => cachedScores[key]);
        const teamMembers = scoresArray.filter(item => item.team === teamName);
        
        teamMembers.sort((a,b) => (b.totalScore || 0) - (a.totalScore || 0));

        teamMembers.forEach(member => {
            const div = document.createElement('div');
            div.className = "audit-item";

            const userTotal = member.totalScore || member.score || 0;
            const userAvg = member.averageScore || userTotal;
            const userCount = member.entriesCount || 1;

            let flagElement = "";
            if (member.flagged === true) {
                flagElement = `<div class="flag-badge">⚠️ Flagged: Abnormal Average Spike</div>`;
            }

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="color: var(--text-main); font-size: 1.05rem;">${member.user}</strong>
                    <span style="color: var(--accent-green); font-weight:700; font-size: 1.1rem;">${userTotal} pts</span>
                </div>
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">
                    Average Score: <strong style="color: var(--accent-blue);">${userAvg}</strong> (${userCount} entries logged)
                </div>
                ${flagElement}
            `;
            modalBody.appendChild(div);
        });

        document.getElementById('auditModal').style.display = 'flex';
    }

    function closeModal(e) {
        if (e.target.id === 'auditModal') {
            document.getElementById('auditModal').style.display = 'none';
        }
    }
</script>
</body>
</html>
